<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <!-- Outer brand box with high-contrast shadow -->
  <rect x="14" y="14" width="70" height="70" fill="#FFD60A" stroke="#000000" stroke-width="4" rx="4" />
  <rect x="10" y="10" width="70" height="70" fill="#9D4EDD" stroke="#000000" stroke-width="4" rx="4" />
  
  <!-- Floating canvas circle element -->
  <circle cx="45" cy="45" r="16" fill="#39FF14" stroke="#000000" stroke-width="4" />
  
  <!-- Visual canvas pen tip/node -->
  <polygon points="45,35 55,55 35,55" fill="#FF007F" stroke="#000000" stroke-width="3" />
  
  <!-- Brand text with heavy shadow -->
  <text x="100" y="65" font-family="'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="44" fill="#000000">Canvas<tspan fill="#9D4EDD">0</tspan></text>
</svg>
